<!DOCTYPE html> <html lang="vi">  <head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>PANEL VIP 👑</title>  <style>  *{ margin:0; padding:0; box-sizing:border-box; font-family:Consolas; }  body{ background:#000; color:#00ffae; overflow-x:hidden; padding:12px; }  /* RGB BORDER */  body::after{  content:"";  position:fixed;  top:8px; left:8px; right:8px; bottom:8px;  border:4px solid #00ffae;  border-radius:24px;  pointer-events:none;  animation:rgb 5s linear infinite;  z-index:99999;  }  @keyframes rgb{  0%{ border-color:#ff0000; box-shadow:0 0 18px #ff0000; stroke:#ff0000; }  20%{ border-color:#ffff00; box-shadow:0 0 18px #ffff00; stroke:#ffff00; }  40%{ border-color:#00ff00; box-shadow:0 0 18px #00ff00; stroke:#00ff00; }  60%{ border-color:#00ffff; box-shadow:0 0 18px #00ffff; stroke:#00ffff; }  80%{ border-color:#ff00ff; box-shadow:0 0 18px #ff00ff; stroke:#ff00ff; }  100%{ border-color:#ff0000; box-shadow:0 0 18px #ff0000; stroke:#ff0000; }  }  /* LOGIN */  #loginPage{  display:flex;  justify-content:center; align-items:center;  min-height:100vh;  }  .login{  width:100%; max-width:420px;  background:#000;  border:3px solid #00ffae;  border-radius:24px;  padding:24px;  animation:rgb 5s linear infinite;  }  .title{  font-size:32px;  font-weight:bold;  text-align:center;  margin-bottom:16px;  }  .icon{  font-size:70px;  text-align:center;  margin-bottom:18px;  }  input{  width:100%;  padding:14px;  border-radius:16px;  border:2px solid #00ffae;  background:#111;  color:#00ffae;  font-size:18px;  outline:none;  }  button{  width:100%;  padding:14px;  border:none;  border-radius:16px;  background:#00ffae;  color:#000;  font-size:18px;  font-weight:bold;  margin-top:16px;  }  /* LOAD */  #loadingBox{  display:none;  position:fixed;  inset:0;  background:rgba(0,0,0,.95);  z-index:999999;  justify-content:center; align-items:center;  }  .load-card{  width:320px;  padding:24px;  background:#000;  border-radius:24px;  border:3px solid #00ffae;  text-align:center;  animation:rgb 5s linear infinite;  }  .load-icon{  font-size:60px;  margin-bottom:16px;  }  .load-title{  font-size:24px;  font-weight:bold;  margin-bottom:18px;  }  .bar{  width:100%;  height:16px;  background:#111;  border-radius:30px;  overflow:hidden;  border:2px solid #00ffae;  }  .bar-inside{  width:0%;  height:100%;  background:#00ffae;  box-shadow:0 0 12px #00ffae;  transition:.2s;  }  #loadText{  margin-top:14px;  font-size:20px;  font-weight:bold;  }  /* PANEL */  #panel{  display:none;  max-width:480px;  margin:auto;  }  .card{  background:#000;  border:3px solid #00ffae;  border-radius:24px;  padding:16px;  margin-bottom:14px;  animation:rgb 5s linear infinite;  }  .logo{  font-size:28px;  font-weight:bold;  text-align:center;  }  .big{  font-size:70px;  text-align:center;  margin:10px 0;  }  .label{  font-size:14px;  opacity:.7;  margin-bottom:8px;  }  .value{  font-size:20px;  font-weight:bold;  word-break:break-word;  }  /* GRID */  .grid{  display:grid;  grid-template-columns:1fr 1fr;  gap:10px;  }  /* FUNC */  .func{  border:2px solid #00ffae;  border-radius:16px;  padding:10px;  text-align:center;  min-height:118px;  display:flex;  flex-direction:column;  justify-content:center; align-items:center;  }  .func-icon{  font-size:24px;  margin-bottom:6px;  }  .func-name{  font-size:12px;  }  /* SWITCH */  .switch{  position:relative;  width:58px;  height:30px;  margin-top:8px;  }  .switch input{  display:none;  }  .slider{  position:absolute;  inset:0;  background:#111;  border-radius:50px;  border:2px solid #00ffae;  }  .slider:before{  content:"";  position:absolute;  width:18px; height:18px;  left:4px; top:4px;  background:#00ffae;  border-radius:50%;  transition:.3s;  box-shadow:0 0 10px #00ffae;  }  .switch input:checked + .slider:before{  transform:translateX(26px);  }  /* FF */  .ff{  text-align:center;  cursor:pointer;  }  .ff-icon{  font-size:48px;  margin-bottom:8px;  }  /* ECG */  .stats{  font-size:24px;  font-weight:bold;  text-align:center;  margin-bottom:10px;  }  .ecg{  width:100%;  height:90px;  overflow:hidden;  position:relative;  }  .ecg svg{  width:200%; height:100%;  position:absolute;  left:0; top:0;  animation:move 4s linear infinite;  }  @keyframes move{  0%{ transform:translateX(0); }  100%{ transform:translateX(-50%); }  }  .ecg path{  fill:none;  stroke-width:4;  stroke-linecap:round;  filter:drop-shadow(0 0 8px currentColor);  animation:rgb 4s linear infinite;  }  </style>  </head>  <body>  <!-- LOGIN -->  <div id="loginPage">  <div class="login">  <div class="title"> PANEL VIP 👑 </div>  <div class="icon"> 👑 </div>  <input type="text" id="keyInput" placeholder="Nhập Key">  <button onclick="login()"> ĐĂNG NHẬP </button>  </div>  </div>  <!-- LOADING -->  <div id="loadingBox">  <div class="load-card">  <div class="load-icon"> 🔑 </div>  <div class="load-title"> ĐANG LOAD KEY... </div>  <div class="bar">  <div class="bar-inside" id="loadBar"> </div>  </div>  <div id="loadText"> 0% </div>  </div>  </div>  <!-- PANEL -->  <div id="panel">  <!-- HEADER -->  <div class="card">  <div class="logo"> PANEL VIP 👑 </div>  <div class="big"> ⚡ </div>  <button onclick="logout()"> ĐĂNG XUẤT </button>  </div>  <!-- KEY -->  <div class="card">  <div class="label"> KEY ACTIVE </div>  <div class="value" id="showKey">  VIPKEY999  </div>  </div>  <!-- TIME -->  <div class="card">  <div class="label"> THỜI GIAN KEY </div>  <div class="value" id="timeKey">  0D 0H 0M 0S  </div>  </div>  <!-- DEVICE -->  <div class="card">  <div class="label"> MÃ THIẾT BỊ </div>  <div class="value" id="deviceId">  DEVICE-X92KQ8P  </div>  </div>  <!-- FUNCTIONS -->  <div class="card">  <div class="grid">  <div class="func"> <div class="func-icon">🎯</div> <div class="func-name">AIMLOCK</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  <div class="func"> <div class="func-icon">🧠</div> <div class="func-name">HEAD LOCK</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  <div class="func"> <div class="func-icon">⚡</div> <div class="func-name">FIX LỐ</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  <div class="func"> <div class="func-icon">📳</div> <div class="func-name">FIX RUNG</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  <div class="func"> <div class="func-icon">🎯</div> <div class="func-name">NHẸ TÂM</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  <div class="func"> <div class="func-icon">🔒</div> <div class="func-name">KHOÁ VÙNG ĐẦU</div> <label class="switch"> <input type="checkbox"> <span class="slider"></span> </label> </div>  </div>  </div>  <!-- FF -->  <div class="card">  <div class="grid">  <div class="ff" onclick="openFF()">  <div class="ff-icon"> 🔥 </div>  <div> FREE FIRE </div>  </div>  <div class="ff" onclick="openFFMAX()">  <div class="ff-icon"> ⚡ </div>  <div> FREE FIRE MAX </div>  </div>  </div>  </div>  <!-- FPS -->  <div class="card">  <div class="stats">  <span id="fps"> 120 </span>  FPS  </div>  <div class="ecg">  <svg viewBox="0 0 1000 120">  <path d=" M0 60 L40 60 L60 15 L80 100 L100 60 L160 60 L180 15 L200 100 L220 60 L1000 60 "/>  </svg>  </div>  </div>  </div>  <script>  /* AUTO LOGIN */  window.onload = ()=>{  let saved = localStorage.getItem("panel_key");  if(saved){  document.getElementById("showKey") .innerText = saved;  document.getElementById("loginPage") .style.display = "none";  document.getElementById("panel") .style.display = "block";  }  };  /* LOGIN */  function login(){  let key = document.getElementById("keyInput").value;  if(key.length < 4){  alert("Nhập key!");  return;  }  /* SHOW LOAD */  document.getElementById("loadingBox") .style.display = "flex";  let bar = document.getElementById("loadBar");  let text = document.getElementById("loadText");  let percent = 0;  let interval = setInterval(()=>{  percent += 5;  bar.style.width = percent + "%";  text.innerText = percent + "%";  if(percent >= 100){  clearInterval(interval);  /* SAVE */  localStorage.setItem( "panel_key", key );  /* FIX TIME */  let expire = Date.now() + (1 * 24 * 60 * 60 * 1000);  localStorage.setItem( "panel_expire", expire );  document.getElementById("showKey") .innerText = key;  document.getElementById("loadingBox") .style.display = "none";  document.getElementById("loginPage") .style.display = "none";  document.getElementById("panel") .style.display = "block";  }  },120);  }  /* LOGOUT */  function logout(){  localStorage.clear();  location.reload();  }  /* FIX TIME */  setInterval(()=>{  let exp = parseInt(localStorage.getItem("panel_expire"));  if(!exp) return;  let remain = exp - Date.now();  if(remain <= 0){  localStorage.clear();  location.reload();  return;  }  let days = Math.floor(remain / 86400000);  let hours = Math.floor((remain % 86400000) / 3600000);  let mins = Math.floor((remain % 3600000) / 60000);  let secs = Math.floor((remain % 60000) / 1000);  document.getElementById("timeKey") .innerText = days + "D " + hours + "H " + mins + "M " + secs + "S";  },1000);  /* FPS */  setInterval(()=>{  document.getElementById("fps") .innerText = 80 + Math.floor(Math.random()*160);  },1000);  /* OPEN */  function openFF(){  window.location.href = "https://play.google.com/store/apps/details?id=com.dts.freefireth";  }  function openFFMAX(){  window.location.href = "https://play.google.com/store/apps/details?id=com.dts.freefiremax";  }  </script>  </body>  </html>
